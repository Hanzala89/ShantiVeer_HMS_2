{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - SantiVeer HMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{% static 'css/main.css' %}" rel="stylesheet">
</head>
<body>
<div class="auth-wrapper-simple">
    <div class="auth-card-simple">
        <h2><i class="bi bi-key text-primary"></i> Forgot Password</h2>
        <p class="text-muted small">Enter your registered email. We will send a link to create a new password.</p>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Email</label>
                {{ form.email }}
            </div>
            <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
        </form>
        <p class="text-center mt-3 mb-0"><a href="{% url 'accounts:login' %}">Back to Login</a></p>
    </div>
</div>
</body>
</html>
