{% extends 'base_cyan.html' %}
{% block title %}Add Doctor{% endblock %}
{% block page_title %}Add Doctor{% endblock %}
{% block content %}
<div class="d-flex gap-3 p-3">
    <div class="master-sidebar" style="width:150px">
        <a href="{% url 'masterdata:doctors' %}" class="active">add-doctor</a>
        <a href="{% url 'masterdata:doctor_list' %}">list-doctor</a>
    </div>
    <div class="flex-grow-1 form-card">
        <h2>Add Doctor</h2>
        <form method="post">{% csrf_token %}
            <div class="row g-2">
                <div class="col-md-4"><label class="small">Doctor Name</label><input name="name" class="form-control" required></div>
                <div class="col-md-3"><label class="small">Department</label><input name="department" class="form-control"></div>
                <div class="col-md-3"><label class="small">Specialization</label><input name="specialization" class="form-control"></div>
                <div class="col-md-2"><label class="small">Phone</label><input name="phone" class="form-control"></div>
            </div>
            <button type="submit" class="btn btn-primary mt-3">Add Doctor</button>
        </form>
    </div>
</div>
{% endblock %}
