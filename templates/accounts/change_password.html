{% extends 'base_dashboard.html' %}
{% block page_title %}Change Password{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="widget-card">
            <h5 class="mb-3"><i class="bi bi-shield-lock"></i> Change Password</h5>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}<div class="text-danger small">{{ field.errors.0 }}</div>{% endif %}
                </div>
                {% endfor %}
                <button type="submit" class="btn btn-primary">Update Password</button>
                <a href="{% url 'accounts:change_email' %}" class="btn btn-outline-info ms-2"><i class="bi bi-envelope"></i> Change Email ID</a>
                <a href="{% url 'core:home' %}" class="btn btn-secondary ms-2">Cancel</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
