{% extends 'base_dashboard.html' %}
{% block page_title %}Edit Bed{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="widget-card">
      <div class="widget-title mb-3"><i class="bi bi-pencil"></i> Edit Bed {{ bed.bed_no }} — Room {{ bed.room_no }}</div>
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Room No.</label>
          <input type="text" name="room_no" class="form-control" value="{{ bed.room_no }}" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Bed No.</label>
          <input type="text" name="bed_no" class="form-control" value="{{ bed.bed_no }}" required>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Status</label>
          <select name="status" class="form-select">
            <option value="Vacant" {% if bed.status == 'Vacant' %}selected{% endif %}>Vacant</option>
            <option value="Occupied" {% if bed.status == 'Occupied' %}selected{% endif %}>Occupied</option>
            <option value="Maintenance" {% if bed.status == 'Maintenance' %}selected{% endif %}>Maintenance</option>
          </select>
        </div>
        <div class="d-flex gap-2 mt-4">
          <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Save Changes</button>
          <a href="{% url 'core:bed_manage' %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
